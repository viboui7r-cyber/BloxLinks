<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cursed Clash</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hud">
    <div class="player">
        <span id="p1Text">YUJI 100</span>
        <div class="bar"><div id="p1Bar"></div></div>
    </div>

    <div id="timer">60</div>

    <div class="player">
        <span id="p2Text">GOJO 100</span>
        <div class="bar"><div id="p2Bar"></div></div>
    </div>
</div>

<canvas id="game" width="900" height="400"></canvas>

<div class="skills">
    <div>F G H</div>
    <div>K L ;</div>
</div>

<script src="sprites.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ================= GAME STATE ================= */
let timer = 60;
let hitFlash = 0;
let shake = 0;

let p1 = { x:100, y:250, health:100, dir:1 };
let p2 = { x:700, y:250, health:100, dir:-1 };

let keys = {};
let projectiles = [];

/* ================= INPUT ================= */
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/* ================= TIMER ================= */
setInterval(()=>{
    if(timer > 0) timer--;
    document.getElementById("timer").innerText = timer;
},1000);

/* ================= BACKGROUND ================= */
let stars = [];
for(let i=0;i<80;i++){
    stars.push({
        x: Math.random()*900,
        y: Math.random()*400,
        speed: Math.random()*0.5 + 0.2
    });
}

function drawBackground(){
    ctx.fillStyle = "#050010";
    ctx.fillRect(0,0,900,400);

    ctx.fillStyle = "white";
    stars.forEach(s=>{
        s.y += s.speed;
        if(s.y > 400) s.y = 0;
        ctx.fillRect(s.x, s.y, 2,2);
    });
}

/* ================= SPRITES ================= */
function drawSprite(sprite, x, y, scale=5){
    for(let r=0;r<sprite.length;r++){
        for(let c=0;c<sprite[r].length;c++){
            let pixel = sprite[r][c];
            if(pixel !== 0){
                ctx.fillStyle = COLORS[pixel];
                ctx.fillRect(x + c*scale, y + r*scale, scale, scale);
            }
        }
    }
}

function drawPlayer(p, type){
    if(type === "yuji") drawSprite(YUJI_IDLE, p.x, p.y);
    if(type === "gojo") drawSprite(GOJO_IDLE, p.x, p.y);
}

/* ================= MOVEMENT ================= */
function move(){
    if(keys["a"]) { p1.x -= 3; p1.dir = -1; }
    if(keys["d"]) { p1.x += 3; p1.dir = 1; }

    if(keys["arrowleft"]) { p2.x -= 3; p2.dir = -1; }
    if(keys["arrowright"]) { p2.x += 3; p2.dir = 1; }
}

/* ================= SKILLS ================= */

// Yuji
function divergentFist(){
    if(Math.abs(p1.x - p2.x) < 80){
        p2.health -= 2;
        hitFlash = 3;
    }
}

function blackFlash(){
    if(Math.abs(p1.x - p2.x) < 80){
        p2.health -= 8;
        shake = 8;
        hitFlash = 6;
    }
}

function rush(){
    p1.x += p1.dir * 40;
}

// Gojo
function redBall(){
    projectiles.push({
        x:p2.x,
        y:p2.y,
        vx:-6,
        color:"red",
        size:8,
        damage:3
    });
}

function blueOrb(){
    projectiles.push({
        x:p2.x,
        y:p2.y,
        vx:0,
        color:"cyan",
        size:25,
        damage:5
    });
}

function purple(){
    projectiles.push({
        x:p2.x,
        y:p2.y,
        vx:-8,
        color:"purple",
        size:18,
        damage:12
    });
}

/* ================= INPUT SKILLS ================= */
function handleSkills(){
    if(keys["f"]) divergentFist();
    if(keys["g"]) blackFlash();
    if(keys["h"]) rush();

    if(keys["k"]) redBall();
    if(keys["l"]) blueOrb();
    if(keys[";"]) purple();
}

/* ================= PROJECTILES ================= */
function updateProjectiles(){
    projectiles.forEach(p=>{
        p.x += p.vx;

        if(Math.abs(p.x - p1.x) < 30){
            p1.health -= p.damage;
            hitFlash = 4;
            shake = 4;
        }
    });

    projectiles = projectiles.filter(p => p.x > 0 && p.x < 900);
}

function drawProjectiles(){
    projectiles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);

        ctx.shadowBlur = 20;
        ctx.shadowColor = p.color;

        ctx.fillStyle = p.color;
        ctx.fill();

        ctx.shadowBlur = 0;
    });
}

/* ================= EFFECTS ================= */
function applyShake(){
    if(shake > 0){
        ctx.translate(Math.random()*6-3, Math.random()*6-3);
        shake--;
    }
}

function hitEffect(){
    if(hitFlash > 0){
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(0,0,900,400);
        hitFlash--;
    }
}

/* ================= UI ================= */
function updateUI(){
    document.getElementById("p1Bar").style.width = p1.health + "%";
    document.getElementById("p2Bar").style.width = p2.health + "%";

    document.getElementById("p1Text").innerText = "YUJI " + Math.floor(p1.health);
    document.getElementById("p2Text").innerText = "GOJO " + Math.floor(p2.health);
}

/* ================= GAME LOOP ================= */
function loop(){
    ctx.save();

    applyShake();

    drawBackground();
    move();
    handleSkills();
    updateProjectiles();

    drawPlayer(p1,"yuji");
    drawPlayer(p2,"gojo");
    drawProjectiles();

    hitEffect();

    ctx.restore();

    updateUI();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
