<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cursed Clash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= MENU ================= -->
<div id="menuScreen" class="screen active">
    <h1 class="title">CURSED CLASH</h1>
    <p class="subtitle">JUJUTSU KAISEN</p>

    <div class="menu-panels">
        <div class="panel">
            <h2>PLAYER 1 — YUJI</h2>
            <p>W → Jump</p>
            <p>A / D → Move</p>
            <p>F → Punch</p>
            <p>G → Heavy</p>
            <p>H → Black Flash</p>
        </div>

        <div class="panel">
            <h2>PLAYER 2 — GOJO</h2>
            <p>↑ → Jump</p>
            <p>← / → → Move</p>
            <p>K → Punch</p>
            <p>L → Blue</p>
            <p>; → Purple</p>
        </div>
    </div>

    <p class="start-text">PRESS ENTER TO START</p>
</div>

<!-- ================= GAME ================= -->
<div id="gameScreen" class="screen">
    
    <div class="hud">
        <div class="health-bar">
            <span>YUJI</span>
            <div class="bar"><div id="p1Health"></div></div>
        </div>

        <div id="timer">60</div>

        <div class="health-bar">
            <span>GOJO</span>
            <div class="bar"><div id="p2Health"></div></div>
        </div>
    </div>

    <canvas id="canvas" width="900" height="400"></canvas>

    <!-- Ability UI -->
    <div class="abilities">
        <div class="p1-abilities">
            <span>F</span><span>G</span><span>H</span>
        </div>
        <div class="p2-abilities">
            <span>K</span><span>L</span><span>;</span>
        </div>
    </div>

</div>

<script>
const menu = document.getElementById("menuScreen");
const game = document.getElementById("gameScreen");

window.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        menu.classList.remove("active");
        game.classList.add("active");
        startGame();
    }
});

/* ================= GAME ================= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let p1 = { x:100, y:300, health:100, color:"#ff4d6d" };
let p2 = { x:700, y:300, health:100, color:"#4d9aff" };

let keys = {};

window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function update() {
    // movement
    if(keys["a"]) p1.x -= 4;
    if(keys["d"]) p1.x += 4;

    if(keys["ArrowLeft"]) p2.x -= 4;
    if(keys["ArrowRight"]) p2.x += 4;

    // attacks
    if(keys["f"]) attack(p1, p2);
    if(keys["k"]) attack(p2, p1);

    updateHealth();
}

function attack(attacker, defender){
    if(Math.abs(attacker.x - defender.x) < 60){
        defender.health -= 0.5;
    }
}

function updateHealth(){
    document.getElementById("p1Health").style.width = p1.health + "%";
    document.getElementById("p2Health").style.width = p2.health + "%";
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // background stars
    for(let i=0;i<50;i++){
        ctx.fillStyle="white";
        ctx.fillRect(Math.random()*900, Math.random()*400, 1,1);
    }

    // players
    ctx.fillStyle = p1.color;
    ctx.fillRect(p1.x, p1.y, 40, 80);

    ctx.fillStyle = p2.color;
    ctx.fillRect(p2.x, p2.y, 40, 80);
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function startGame(){
    gameLoop();
}
</script>

</body>
</html>
